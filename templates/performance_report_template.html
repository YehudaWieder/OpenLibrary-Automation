<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Performance Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&display=swap" rel="stylesheet">
  <style>
    /* ── Design Tokens ─────────────────────────────── */
    :root {
      --bg:            #f0f2f8;
      --surface:       #ffffff;
      --surface-2:     #f8fafc;
      --border:        #e2e8f0;
      --text:          #0f172a;
      --text-2:        #475569;
      --text-3:        #94a3b8;
      --brand-1:       #4f46e5;
      --brand-2:       #7c3aed;
      --ok:            #059669;
      --ok-bg:         #ecfdf5;
      --ok-border:     #a7f3d0;
      --warn:          #d97706;
      --warn-bg:       #fffbeb;
      --warn-border:   #fde68a;
      --shadow-sm:     0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md:     0 4px 16px rgba(0,0,0,.07), 0 2px 6px rgba(0,0,0,.04);
      --shadow-lg:     0 20px 44px rgba(0,0,0,.11), 0 8px 18px rgba(0,0,0,.06);
      --r-sm:  8px;
      --r-md: 12px;
      --r-lg: 18px;
      --r-xl: 24px;
    }

    /* ── Reset ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ── Base ─────────────────────────────────────── */
    body {
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 900px 380px at 0% 0%,   rgba(99,102,241,.09) 0%, transparent 65%),
        radial-gradient(ellipse 700px 320px at 100% 5%, rgba(6,182,212,.07)  0%, transparent 60%);
      min-height: 100vh;
    }

    /* ── Sticky Top Bar ───────────────────────────── */
    #topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(16px) saturate(190%);
      -webkit-backdrop-filter: blur(16px) saturate(190%);
      border-bottom: 1px solid var(--border);
      padding: 9px 0;
      box-shadow: var(--shadow-sm);
    }

    .topbar-inner {
      width: min(1280px, 94vw);
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topbar-logo {
      font-weight: 800;
      font-size: 0.85rem;
      color: var(--brand-1);
      letter-spacing: -0.02em;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .topbar-divider { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }

    .topbar-chips { display: flex; gap: 7px; flex-wrap: wrap; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      white-space: nowrap;
    }

    .chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* ── Layout ───────────────────────────────────── */
    .container {
      width: min(1280px, 94vw);
      margin: 0 auto;
      padding: 30px 0 64px;
    }

    /* ── Hero ─────────────────────────────────────── */
    .hero {
      border-radius: var(--r-xl);
      padding: 42px 48px;
      background: linear-gradient(135deg, #1e1b4b 0%, #4f46e5 45%, #0891b2 100%);
      color: #fff;
      box-shadow: var(--shadow-lg);
      margin-bottom: 26px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    /* dot-grid overlay */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,.14) 1px, transparent 1px);
      background-size: 26px 26px;
      mask-image: linear-gradient(135deg, transparent 20%, rgba(0,0,0,.55) 100%);
      pointer-events: none;
    }

    /* glow spots */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 88% 12%, rgba(255,255,255,.18) 0%, transparent 38%),
        radial-gradient(circle at 6%  88%, rgba(255,255,255,.08) 0%, transparent 30%);
      pointer-events: none;
    }

    .hero-content { position: relative; z-index: 1; }

    .hero-eyebrow {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.65;
      margin-bottom: 10px;
    }

    .hero h1 {
      font-size: clamp(1.75rem, 3.8vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -0.035em;
      line-height: 1.12;
      margin-bottom: 12px;
    }

    .hero-sub {
      font-size: 0.93rem;
      opacity: 0.8;
      max-width: 500px;
      line-height: 1.6;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
      gap: 12px;
      margin-top: 28px;
    }

    .stat-card {
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: var(--r-md);
      padding: 14px 16px;
      backdrop-filter: blur(6px);
    }

    .stat-label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      opacity: 0.72;
    }

    .stat-value {
      display: block;
      font-size: clamp(0.9rem, 2vw, 1.5rem);
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-top: 5px;
      word-break: break-word;
    }

    /* ── Run Card ─────────────────────────────────── */
    .run {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--brand-1);
      border-radius: var(--r-lg);
      margin-bottom: 18px;
      box-shadow: var(--shadow-md);
      overflow: hidden;
      animation: slideUp 360ms cubic-bezier(.22,.68,0,1.1) both;
    }
    .run:nth-child(1) { animation-delay:  20ms; }
    .run:nth-child(2) { animation-delay:  70ms; }
    .run:nth-child(3) { animation-delay: 120ms; }
    .run:nth-child(4) { animation-delay: 170ms; }
    .run:nth-child(5) { animation-delay: 220ms; }

    .run[data-exceeded="true"] { border-left-color: var(--warn); }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ── Run Header ───────────────────────────────── */
    .run-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 22px;
      cursor: pointer;
      user-select: none;
      transition: background 150ms;
    }
    .run-header:hover { background: #fafbff; }
    .run[data-exceeded="true"] .run-header:hover { background: #fffdf7; }

    .run-badge {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 3px 10px rgba(79,70,229,.32);
    }

    .run[data-exceeded="true"] .run-badge {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      box-shadow: 0 3px 10px rgba(217,119,6,.3);
    }

    .run-meta { flex: 1; min-width: 0; }

    .run-title {
      font-size: 0.97rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .run-ts {
      display: flex;
      flex-wrap: wrap;
      gap: 3px 10px;
      font-size: 0.76rem;
      color: var(--text-3);
      margin-top: 3px;
    }

    .run-pills { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 999px;
    }
    .pill-ok       { background: var(--ok-bg);     color: var(--ok);   border: 1px solid var(--ok-border); }
    .pill-exceeded { background: var(--warn-bg);   color: var(--warn); border: 1px solid var(--warn-border); }
    .pill-neutral  { background: var(--surface-2); color: var(--text-3); border: 1px solid var(--border); }

    .run-toggle {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--text-3);
      transition: transform 260ms cubic-bezier(.34,1.56,.64,1), background 150ms;
      pointer-events: none;
    }
    .run.is-collapsed .run-toggle { transform: rotate(-90deg); }

    /* ── Run Body ─────────────────────────────────── */
    .run-body {
      padding: 0 22px 22px;
      border-top: 1px solid var(--border);
    }
    .run.is-collapsed .run-body { display: none; }

    /* ── Section Labels ───────────────────────────── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-3);
      padding: 18px 0 9px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Context Grid ─────────────────────────────── */
    .ctx-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 8px;
    }

    .ctx-item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 8px 12px;
    }

    .ctx-key {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-3);
    }

    .ctx-val {
      font-size: 0.84rem;
      margin-top: 2px;
      color: var(--text);
      word-break: break-word;
    }

    /* ── Metrics Table ────────────────────────────── */
    .metrics-wrap {
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      overflow: hidden;
    }

    .metrics-wrap table { width: 100%; border-collapse: collapse; }

    .metrics-wrap thead th {
      padding: 9px 14px;
      background: var(--surface-2);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-2);
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    .metrics-wrap tbody tr { transition: background 120ms; }
    .metrics-wrap tbody tr:hover { background: #fafbff; }

    .metrics-wrap tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 0.86rem;
      vertical-align: middle;
    }
    .metrics-wrap tbody tr:last-child td { border-bottom: none; }

    .metric-name {
      font-family: "SF Mono", "Cascadia Code", "Fira Code", ui-monospace, monospace;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
    }

    .metric-val-wrap { display: flex; flex-direction: column; gap: 5px; }
    .metric-val { font-weight: 700; font-size: 0.9rem; }

    .metric-bar-track {
      height: 4px;
      border-radius: 999px;
      background: var(--border);
      overflow: hidden;
      width: 100%;
      max-width: 150px;
    }

    .metric-bar-fill {
      height: 100%;
      border-radius: 999px;
      width: 0%;
      transition: width 700ms cubic-bezier(.22,.68,0,1);
    }
    .bar-ok   { background: linear-gradient(90deg, #34d399, #059669); }
    .bar-warn { background: linear-gradient(90deg, #fbbf24, #d97706); }

    /* ── Status Badge ─────────────────────────────── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.69rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .status-ok       { background: var(--ok-bg);     color: var(--ok);   border: 1px solid var(--ok-border);   }
    .status-exceeded { background: var(--warn-bg);   color: var(--warn); border: 1px solid var(--warn-border); }
    .status-na       { background: var(--surface-2); color: var(--text-3); border: 1px solid var(--border);    }

    /* ── Screenshots ──────────────────────────────── */
    .shots {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
    }

    .shot {
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      overflow: hidden;
      background: var(--surface);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }
    .shot:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }

    .shot a { display: block; }

    .shot img {
      width: 100%;
      height: 155px;
      object-fit: cover;
      display: block;
      background: var(--surface-2);
    }

    .shot-caption {
      padding: 7px 10px;
      font-size: 10px;
      color: var(--text-3);
      word-break: break-all;
      border-top: 1px solid var(--border);
      font-family: ui-monospace, monospace;
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 760px) {
      .container { padding: 16px 0 44px; }
      .hero { padding: 24px 20px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .run-header { padding: 12px 14px; gap: 10px; }
      .run-body { padding: 0 14px 16px; }
      .run-badge { width: 34px; height: 34px; font-size: 0.7rem; }
      .run-pills { display: none; }
      .metric-bar-track { max-width: 80px; }
      .ctx-grid { grid-template-columns: 1fr; }
      .shots { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
  </style>
</head>
<body>

  <!-- Sticky top bar -->
  <header id="topbar">
    <div class="topbar-inner">
      <span class="topbar-logo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Performance Report
      </span>
      <span class="topbar-divider"></span>
      <div class="topbar-chips" id="topbar-chips"></div>
    </div>
  </header>

  <div class="container">

    <!-- Hero -->
    <section class="hero">
      <div class="hero-content">
        <p class="hero-eyebrow">OpenLibrary Automation</p>
        <h1>Performance Report</h1>
        <p class="hero-sub">Historical run analytics with threshold tracking, screenshots, and execution context.</p>
        <div class="stats">
          <div class="stat-card">
            <span class="stat-label">Last Updated</span>
            <span class="stat-value">{{LAST_UPDATED}}</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Total Runs</span>
            <span class="stat-value">{{TOTAL_RUNS}}</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Total Metrics</span>
            <span class="stat-value">{{TOTAL_METRICS}}</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Run cards (injected by Python) -->
    {{RUN_SECTIONS}}

  </div>

  <script>
  (function () {
    'use strict';

    /* 1. Status cells → styled badges */
    document.querySelectorAll('td.status-cell').forEach(function (cell) {
      const raw = (cell.textContent || '').trim().toUpperCase();
      if      (raw === 'OK')       cell.innerHTML = '<span class="status-badge status-ok">&#10003; OK</span>';
      else if (raw === 'EXCEEDED') cell.innerHTML = '<span class="status-badge status-exceeded">&#9888; EXCEEDED</span>';
      else if (raw === 'N/A')      cell.innerHTML = '<span class="status-badge status-na">N/A</span>';
    });

    /* 2. Animate progress bars */
    document.querySelectorAll('tr.metric-row').forEach(function (row) {
      const val       = parseFloat(row.dataset.value);
      const threshold = parseFloat(row.dataset.threshold);
      if (!isNaN(val) && !isNaN(threshold) && threshold > 0) {
        const pct    = Math.min((val / threshold) * 100, 110);
        const isOk   = val <= threshold;
        const fill   = row.querySelector('.metric-bar-fill');
        if (fill) {
          fill.classList.add(isOk ? 'bar-ok' : 'bar-warn');
          requestAnimationFrame(function () {
            requestAnimationFrame(function () { fill.style.width = pct.toFixed(1) + '%'; });
          });
        }
      }
    });

    /* 3. Compute summary pills per run */
    document.querySelectorAll('.run').forEach(function (runEl) {
      let ok = 0, warn = 0;
      runEl.querySelectorAll('.status-badge').forEach(function (b) {
        if (b.classList.contains('status-ok'))       ok++;
        if (b.classList.contains('status-exceeded')) warn++;
      });
      const pills = runEl.querySelector('.run-pills');
      if (pills) {
        if (ok)   pills.innerHTML += '<span class="pill pill-ok">&#10003; ' + ok + ' OK</span>';
        if (warn) pills.innerHTML += '<span class="pill pill-exceeded">&#9888; ' + warn + ' Exceeded</span>';
        if (!ok && !warn) pills.innerHTML += '<span class="pill pill-neutral">No metrics</span>';
      }
      if (warn > 0) runEl.setAttribute('data-exceeded', 'true');
    });

    /* 4. Collapsible run cards */
    document.querySelectorAll('.run-header').forEach(function (header) {
      header.addEventListener('click', function () {
        header.closest('.run').classList.toggle('is-collapsed');
      });
    });

    /* 5. Top-bar summary chips */
    const chipsEl  = document.getElementById('topbar-chips');
    const total    = document.querySelectorAll('.run').length;
    const exceeded = document.querySelectorAll('.run[data-exceeded="true"]').length;
    const passing  = total - exceeded;
    if (chipsEl) {
      if (total)   chipsEl.innerHTML += '<span class="chip"><span class="chip-dot" style="background:#94a3b8"></span>' + total + ' Runs</span>';
      if (passing) chipsEl.innerHTML += '<span class="chip"><span class="chip-dot" style="background:#059669"></span>' + passing + ' Passed</span>';
      if (exceeded) chipsEl.innerHTML += '<span class="chip"><span class="chip-dot" style="background:#d97706"></span>' + exceeded + ' With Issues</span>';
    }
  })();
  </script>
</body>
</html>
